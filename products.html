<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جميع التيشيرتات | Next Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/pages/products.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main class="container">
      <!-- page title -->
      <section class="page-header">
        <h1>جميع التيشيرتات</h1>
        <p>اكتشف مجموعتنا المتنوعة من التيشيرتات</p>
      </section>

      <!-- Products Filter -->
      <section class="products-filter">
        <!-- Search Bar -->
        <div class="search-box">
          <input type="text" id="search-input" placeholder="ابحث عن منتج..." />
          <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>

        <!-- Sort Filter -->
        <div class="filters">
          <select id="sort-filter">
            <option value="">الترتيب الافتراضي</option>
            <option value="price-asc">السعر من الأقل للأعلى</option>
            <option value="price-desc">السعر من الأعلى للأقل</option>
          </select>
        </div>
      </section>

      <!-- Products Grid -->
      <section class="products-section">
        <div class="products-grid" id="products-grid">
          <!-- Product Card -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./scripts/pages/products-page.js"></script>
  </body>
</html>
