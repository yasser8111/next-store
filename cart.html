<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سلة التسوق | Next Store</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="../../styles/main.css" />
    <link rel="stylesheet" href="../../styles/pages/cart.css" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- ===================== CART PAGE ===================== -->
    <main class="cart-page container">
      <h2 class="cart-title"><i class="fa-solid fa-cart-shopping"></i> سلة التسوق</h2>
      <div id="discount-banner"></div>


      <div class="cart-layout">
        <!-- 🛒 CART ITEMS -->
        <div class="cart-items-section">
          <div id="cart-container" class="cart-items"></div>
        </div>

        <!-- 💰 CART SUMMARY -->
        <aside class="cart-summary-section">
  <h3>ملخص الطلب</h3>

  <table class="summary-table">
    <tr>
      <td>المجموع الفرعي:</td>
      <td id="subtotal">0</td>
    </tr>
    <tr>
      <td>التوصيل:</td>
      <td id="shipping">0</td>
    </tr>
    <tr>
      <td>الخصم:</td>
      <td id="discount">0</td>
    </tr>
    <tr class="summary-divider">
      <td colspan="2"><hr /></td>
    </tr>
    <tr class="summary-total-row">
      <td>المجموع النهائي:</td>
      <td id="cart-total">0</td>
    </tr>
  </table>

  <button id="checkout-btn">إتمام الشراء</button>
</aside>

      </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./scripts/pages/cart-page.js"></script>
  </body>
</html>
