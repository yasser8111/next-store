<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next Store</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/pages/product-details.css" />

    <!-- Google Fonts: Noto Kufi Arabic -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <!-- ===================== PAGE CONTENT ===================== -->
    <main class="container">
      <section class="product-details-section">
        <div id="product-details">
          <!-- loud product's details here by JS -->
        </div>
      </section>

      <!-- ===================== Products Section ===================== -->
      <section class="products-section">
        <div class="products-grid">
          <!-- Product Card -->
        </div>
      </section>
    </main>

    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>

    <!-- ===================== Scripts ===================== -->
    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./scripts/pages/product-details.js"></script>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  </body>
</html>
