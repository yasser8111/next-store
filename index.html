<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next Store</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/pages/home.css" />

    <!-- Google Fonts: Noto Kufi Arabic -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <!-- ===================== Hero Section ===================== -->
    <section class="hero">
      <div class="hero-overlay">
        <div class="hero-content container">
          <h1>تيشيرتك… على ذوقك!</h1>
          <p>اختر من تصاميمنا أو صمم تيشيرتك الخاص</p>
          <a href="#products" class="btn-primary">تسوق الآن</a>
        </div>
      </div>
    </section>

    <!-- ===================== PAGE CONTENT ===================== -->
    <main class="container">
      <!-- ===================== Products Section ===================== -->
      <!-- Products Grid -->
      <section class="products-section" id="products">
        <div class="section-header">
          <h2>تيشيرتات مميزة</h2>
          <p>
            تشكيلة واسعة لتختار ما يعجبك، وإذا لم يعجبك شيء… صمم تيشيرتك الخاص!
          </p>
        </div>

        <div class="products-grid" id="products-grid">
          <!-- Product Card -->
        </div>
      </section>
    </main>

    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>

    <!-- ===================== Scripts ===================== -->
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
