<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next Store</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/pages/checkout.css" />

    <!-- Google Fonts: Noto Kufi Arabic -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <main class="container-sm">
      <!-- ==================== Customer Info ==================== -->
      <section class="checkout-section">
        <h2 class="section-title">بيانات العميل</h2>

        <div class="form-group">
          <label for="customer-name">الاسم الكامل</label>
          <input
            type="text"
            id="customer-name"
            placeholder="أدخل الاسم الرباعي"
            required
          />
        </div>

        <div class="form-group">
          <label for="customer-phone">رقم الهاتف</label>
          <input
            type="tel"
            id="customer-phone"
            placeholder="05xxxxxxxx"
            required
          />
        </div>

        <div class="form-group">
          <label for="customer-city">المدينة / المنطقة</label>
          <select id="customer-city" required>
            <option value="" disabled selected>اختر المدينة</option>
            <option value="المكلا">المكلا</option>
            <option value="القطن">القطن</option>
            <option value="سيئون">سيئون</option>
            <option value="الشحر">الشحر</option>
            <option value="تريم">تريم</option>
            <option value="أخرى">أخرى...</option>
          </select>
        </div>

        <div class="form-group" id="custom-city-group" style="display: none">
          <label for="custom-city">أضف مدينة جديدة</label>
          <input type="text" id="custom-city" placeholder="اكتب اسم المدينة" />
        </div>

        <div class="form-group">
          <label for="customer-address">العنوان التفصيلي</label>
          <textarea
            id="customer-address"
            placeholder="الشارع – الحي – تفاصيل إضافية"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="customer-note">ملاحظات</label>
          <textarea
            id="customer-note"
            placeholder="اكتب ملاحظاتك هنا (اختياري)"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="order-number">رقم الطلب</label>
          <input type="text" id="order-number" readonly />
        </div>
      </section>

      <!-- ==================== Cart Summary ==================== -->
      <section class="checkout-section">
        <h2 class="section-title">ملخص السلة</h2>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-total">
          <span>الإجمالي:</span>
          <strong id="cart-total">0 ر.س</strong>
        </div>
      </section>

      <!-- ==================== Payment Info ==================== -->
      <section class="checkout-section">
        <h2 class="section-title">خيارات الدفع</h2>

        <div class="bank">
          <div class="bank-icon">💳</div>
          <div>
            <h3>بنك العمقي</h3>
            <p>رقم الحساب: <strong>1234567890</strong></p>
            <p>الاسم: <strong>شركة نكست ستور للتجارة</strong></p>
          </div>
        </div>

        <div class="bank">
          <div class="bank-icon">🏦</div>
          <div>
            <h3>بنك البسيري</h3>
            <p>رقم الحساب: <strong>9876543210</strong></p>
            <p>الاسم: <strong>شركة نكست ستور للتجارة</strong></p>
          </div>
        </div>

        <p class="note">
          ⚠️ بعد التحويل، يرجى إرسال السند عبر واتساب لتأكيد الطلب.
        </p>
      </section>

      <!-- ==================== Confirm Button ==================== -->
      <button id="confirm-order-btn" class="confirm-btn">
        تأكيد الطلب عبر واتساب
      </button>
    </main>

    <!-- footer will be loaded here -->
    <div id="footer-placeholder"></div>

    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./scripts/pages/checkout.js"></script>
  </body>
</html>
